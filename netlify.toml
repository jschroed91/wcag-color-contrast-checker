[build]
  command = "npm run build"
  publish = "dist"

# If you use CRA instead of Vite, publish is usually "build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache + security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # Adjust CSP if you embed, use analytics, etc.
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self';"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[edge_functions]]
  function = "og-image"
  path = "/og"